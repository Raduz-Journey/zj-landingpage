<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEPHRO is coming</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="top-bar">
        <h1>THE ZEPHRO JOURNAL IS COMING</h1>
    </div>

    <div class="hero-container">

        <div class="journal column">
            <img src="images/mockup-journal-x-background.png" alt="ZEPHRO Journal" class="journal-hero-img">
        </div>

        <div class="content-column">
            <h2>Choose the topic to match your life<br>Exactly now</h2>
        </div>

    </div>

    <footer class="landing-footer">
        <form class="waitlist-form" action="./pages/refferal.html" method="POST">
            <div class="form-row">
                <h1 class="footer-heading"> Enter the club</h1>
                <input 
                type="email" 
                placeholder="Enter your email address" 
                pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$" 
                title="Please enter a valid email address ending in a domain like .com" 
                required
                >
                <!-- When this button is clicked, the form validates the email, then fires the action above -->
                <button type="submit">Sign-up</button>
            </div>
        </form>
        <p class="copyrights">&copy; 2026 ZEPHRO Journal. All rights reserved.</p>
    </footer>

    <script src="js/app.js"> </script>

</body>
