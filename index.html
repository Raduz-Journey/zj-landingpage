<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEPHRO is coming</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- SECTION 1: Top Announcement Banner -->
    <div class="top-bar">
        <h1>THE ZEPHRO JOURNAL IS COMING</h1>
    </div>

    <!-- SECTION 2: Split Layout Container -->
    <div class="hero-container">
        
        <!-- Left Side: Product Asset Box -->
        <div class="journal-column">
            <!-- Your main journal mockup image -->
            <img src="journal-cover.png" alt="ZEPHRO Journal">
        </div>

        <!-- Right Side: Content & Waitlist Box -->
        <div class="content-column">
            <h2>First made journal to care of your dignity and wallet. <br>Like never before</h2>
            
            <!-- The Functional Form Group -->
            <form class="waitlist-form" action="#" method="POST">
                <h3>Find out</h3>
                <input type="email" placeholder="Enter your email address" required>
                <button type="submit">The magic place</button>
            </form>
        </div>

    </div>

</body>
